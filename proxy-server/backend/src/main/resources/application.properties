server.port=8080
spring.application.name=caching-proxy

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── Proxy ──────────────────────────────────────────────────
proxy.origin=${PROXY_ORIGIN:http://dummyjson.com}
proxy.timeout-seconds=${PROXY_TIMEOUT:30}
proxy.cache.ttl-hours=${CACHE_TTL_HOURS:1}
proxy.allowed-origins=${ALLOWED_ORIGINS:*}
proxy.admin-key=${ADMIN_API_KEY:}

# ── Rate Limiting ──────────────────────────────────────────
proxy.rate-limit.requests-per-minute=${RATE_LIMIT_RPM:100}
proxy.rate-limit.burst-capacity=${RATE_LIMIT_BURST:20}

# ── Redis ─────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── PostgreSQL ─────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# ── Actuator ───────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.redis.enabled=true
management.health.db.enabled=true

# ── Jackson ────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

#Local Dev ( disable Redis )
spring.cache.type=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.session.SessionAutoConfiguration
spring.jpa.open-in-view=false
