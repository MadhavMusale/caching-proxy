name: CD — Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_BACKEND: ${{ secrets.DOCKER_HUB_USERNAME }}/caching-proxy-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKER_HUB_USERNAME }}/caching-proxy-frontend

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Run tests first ──
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn test -Dspring.profiles.active=test --no-transfer-progress

      # ── Build & Push Docker Images ──
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SSH Deploy to Server ──
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/caching-proxy

            # Pull latest images
            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker pull ${{ env.IMAGE_FRONTEND }}:latest

            # Zero-downtime rolling restart
            docker compose up -d --no-deps --build backend
            sleep 15
            docker compose up -d --no-deps --build frontend
            docker compose up -d --no-deps nginx

            # Cleanup old images
            docker image prune -f

            echo "✅ Deployed ${{ github.sha }} at $(date)"

      - name: Notify success
        if: success()
        run: echo "🚀 Deployed successfully — ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed — check logs"
